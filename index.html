<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج الطلاب</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f5;
    --muted: #8b8fa8;
    --pass: #4ade80;
    --pass-bg: rgba(74,222,128,0.12);
    --fail: #f87171;
    --fail-bg: rgba(248,113,113,0.12);
    --zero: #94a3b8;
    --zero-bg: rgba(148,163,184,0.1);
    --accent: #818cf8;
    --accent-glow: rgba(129,140,248,0.15);
    --g1: #60a5fa;
    --g2: #34d399;
    --g3: #fbbf24;
  }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  .hero {
    text-align: center;
    padding: 3rem 1.5rem 2rem;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 400px; height: 200px;
    background: radial-gradient(ellipse, rgba(129,140,248,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    font-weight: 500;
  }

  .hero-title {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .hero-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 2.5rem;
    padding: 0 1.5rem;
  }

  .stat-pill {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 999px;
    padding: 8px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }

  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .stat-pill .num { font-weight: 600; font-size: 15px; }
  .stat-pill .lbl { color: var(--muted); }

  .search-wrap {
    max-width: 560px;
    margin: 0 auto 2rem;
    padding: 0 1.5rem;
    position: relative;
  }

  .search-icon {
    position: absolute;
    right: 2rem; top: 50%; transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 50px 14px 20px;
    font-size: 16px;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: rtl;
  }

  .search-input::placeholder { color: var(--muted); }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .results-area {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
  }

  .hint-text {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 3rem 0;
    line-height: 2;
  }

  .hint-icon { font-size: 2.5rem; display: block; margin-bottom: 8px; opacity: 0.5; }

  .result-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: slideIn 0.2s ease;
    transition: border-color 0.2s;
  }

  .result-card:hover { border-color: rgba(255,255,255,0.15); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 46px; height: 46px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600;
    flex-shrink: 0;
  }

  .av-pass { background: var(--pass-bg); color: var(--pass); }
  .av-fail { background: var(--fail-bg); color: var(--fail); }
  .av-zero { background: var(--zero-bg); color: var(--zero); }

  .card-info { flex: 1; min-width: 0; }

  .card-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .grp-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 6px;
  }

  .g1-tag { background: rgba(96,165,250,0.15); color: var(--g1); }
  .g2-tag { background: rgba(52,211,153,0.15); color: var(--g2); }
  .g3-tag { background: rgba(251,191,36,0.15); color: var(--g3); }

  .score-text {
    font-size: 12px;
    color: var(--muted);
  }

  .score-text strong {
    color: var(--text);
    font-weight: 600;
  }

  .status-badge {
    padding: 5px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .badge-pass { background: var(--pass-bg); color: var(--pass); }
  .badge-fail { background: var(--fail-bg); color: var(--fail); }
  .badge-zero { background: var(--zero-bg); color: var(--zero); }

  .not-found {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 3rem 0;
  }

  .count-line {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
    text-align: center;
  }

  .divider {
    border: none;
    border-top: 0.5px solid var(--border);
    margin: 0.5rem 0 1.2rem;
  }

  footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 1rem;
    border-top: 0.5px solid var(--border);
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-label">النتائج الرسمية</div>
  <div class="hero-title">نتائج الامتحان</div>
  <div class="hero-sub">اكتب اسمك للاطلاع على نتيجتك — الدرجة الكاملة 70 | النجاح من 35</div>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-input" type="text" id="search" placeholder="ابحث باسمك هنا..." autocomplete="off">
</div>

<div class="results-area">
  <div class="hint-text" id="hint">
    <span class="hint-icon">🔒</span>
    نتائجك خاصة بك<br>
    <span style="font-size:12px">ابحث باسمك لعرض نتيجتك فقط</span>
  </div>
  <div id="results"></div>
</div>

<footer>جميع النتائج سرية — لا يمكن لأحد رؤية درجات الآخرين</footer>

<script>
const PASS = 35, TOTAL = 70;
const students = [
  ["إبراهيم علي خلف",27,1],["احمد عبد الله خالد",25,1],["الحسن طه غركان",42,1],
  ["انس احمد علي",40,1],["اوس احمد ناظر",27,1],["بشار محمد رافع",26,1],
  ["بكر محمد عبد الله",27,1],["رامي عماد إبراهيم",10,1],["زيد خطاب عمر",35,1],
  ["طارق حكيم خميس",33,1],["عبدالرحمن غانم عبدالمجيد",26,1],["عبدالله هشام جواد",38,1],
  ["عبدالله وليد إسماعيل",46,1],["عبدالملك محمد عادل علوان",38,1],["عبدالملك محمد عبدالستار",40,1],
  ["عصام مؤيد فرحان",31,1],["علي نبيل عبيد",12,1],["فهد احمد عبدالسلام",0,1],
  ["مجيد محمد حميد",20,1],["محمد احمد إسماعيل",54,1],["محمد خطاب عمر",67,1],
  ["محمد زياد داوود",40,1],["محمد غازي فيصل",0,1],["محمد محمود عبد الستار",21,1],
  ["محمد منتظر محمد عبد",29,1],["مصطفى علي حسين علي",45,1],["مصطفى هشام جواد",22,1],
  ["محمد علي عماد موسى",31,1],["ميثم سعيد عوده",44,1],["همام محمد عباس",0,1],
  ["وليد خالد إسماعيل",53,1],["يوسف محمود احمد",20,1],
  ["انس مصطفى زكي",62,2],["اسيد محمد قيس",9,2],["انس صلاح كرجي",37,2],
  ["ايوب مازن إسماعيل",29,2],["بشار نعمه زيدان",12,2],["حسن عماد حسن",20,2],
  ["حسين نعمه حامد",24,2],["خطاب كامل حمادي",16,2],["خطاب ياسين محمد",21,2],
  ["رامي احمد عبد السلام",17,2],["سراج احمد عدنان",0,2],["سرمد سعد جاسم",17,2],
  ["سيف احمد شكر",11,2],["ضاري رعد ربيع",26,2],["عبدالله مناف ياسين",44,2],
  ["عبدالواحد جمال احمد",14,2],["علي مهدي علي",26,2],["ليث محمد عطيه",25,2],
  ["مامون أيوب حسين",0,2],["محمد اياد سرحان",50,2],["مصطفى علاء مهدي",0,2],
  ["معتز محمد كريم",62,2],["وسام خالد جمال",0,2],["يوسف غانم حمدي",43,2],
  ["يونس باسم حميد",13,2],["يونس سرور مهدي",0,2],["يونس نعمه زيدان",13,2],
  ["مجيد دريد عامر",0,2],
  ["احمد اثير اكرم",10,3],["اسامه زيد محسن",38,3],["انس فراس محمد",20,3],
  ["اياد علي خلف",33,3],["حيدر سيف علي",0,3],["سجاد سيف طه",0,3],
  ["سجاد عمر هاشم",47,3],["عباس حسين خلف",47,3],["عبدالرحمن إبراهيم",54,3],
  ["عبد السلام زيدون",59,3],["عبدالله الثير كيلان",28,3],["عثمان عماد محمود",32,3],
  ["عز الدين محمد سامي",39,3],["علي جاسم محمد",11,3],["عمار إسماعيل عبد",22,3],
  ["غياث غيث عبدالكريم",44,3],["غيث علي حسين",21,3],["غيث مازن محمد",18,3],
  ["ليث سفيان عبد الله",31,3],["محمد سعد محمود",48,3],["محمد صباح كرجي",30,3],
  ["محمد غلام عبدالمحسن",16,3],["محمد فوزي غريب",56,3],["محمود عبدالحمد فرحان",23,3],
  ["معتز اركان فرحان",32,3],["نورالدين فائز كاظم",0,3],["يامن جمال فوزي",21,3],
  ["يوسف وسام بدران",31,3]
];

const gNames = ['','المجموعة 1','المجموعة 2','المجموعة 3'];
const gTagClass = ['','g1-tag','g2-tag','g3-tag'];

function getStatus(s) { return s === 0 ? 'zero' : s >= PASS ? 'pass' : 'fail'; }
function getLabel(s)  { return s === 0 ? 'لم يتقدم' : s >= PASS ? 'ناجح ✓' : 'راسب'; }
function getInitials(name) { return name.trim().split(' ').slice(0,2).map(w=>w[0]).join(''); }

// Stats
const passCount  = students.filter(r=>r[1]>=PASS).length;
const failCount  = students.filter(r=>r[1]>0&&r[1]<PASS).length;
const zeroCount  = students.filter(r=>r[1]===0).length;

document.getElementById('statsRow').innerHTML = `
  <div class="stat-pill"><span class="stat-dot" style="background:#818cf8"></span><span class="num">${students.length}</span><span class="lbl">إجمالي</span></div>
  <div class="stat-pill"><span class="stat-dot" style="background:#4ade80"></span><span class="num">${passCount}</span><span class="lbl">ناجح</span></div>
  <div class="stat-pill"><span class="stat-dot" style="background:#f87171"></span><span class="num">${failCount}</span><span class="lbl">راسب</span></div>
  <div class="stat-pill"><span class="stat-dot" style="background:#94a3b8"></span><span class="num">${zeroCount}</span><span class="lbl">لم يتقدم</span></div>
`;

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim();
  const hint = document.getElementById('hint');
  const res  = document.getElementById('results');

  if (!q) {
    hint.style.display = 'block';
    res.innerHTML = '';
    return;
  }

  hint.style.display = 'none';
  const found = students.filter(r => r[0].includes(q));

  if (!found.length) {
    res.innerHTML = `<div class="not-found">لم يُعثر على طالب بهذا الاسم</div>`;
    return;
  }

  const countLine = `<div class="count-line">عُثر على ${found.length} نتيجة</div><hr class="divider">`;

  const cards = found.map(r => {
    const st = getStatus(r[1]);
    return `<div class="result-card">
      <div class="avatar av-${st}">${getInitials(r[0])}</div>
      <div class="card-info">
        <div class="card-name">${r[0]}</div>
        <div class="card-meta">
          <span class="grp-tag ${gTagClass[r[2]]}">${gNames[r[2]]}</span>
          <span class="score-text">الدرجة: <strong>${r[1]} / ${TOTAL}</strong></span>
        </div>
      </div>
      <span class="status-badge badge-${st}">${getLabel(r[1])}</span>
    </div>`;
  }).join('');

  res.innerHTML = countLine + cards;
});
</script>
</body>
</html>
